<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 智能问答系统</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <h2>RAG 智能问答系统</h2>
            <p class="login-subtitle">请登录或注册以开始使用</p>
            <div class="login-tabs">
                <button class="login-tab active" data-tab="login">登录</button>
                <button class="login-tab" data-tab="register">注册</button>
            </div>
            <div class="login-form" id="loginForm">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password">
                </div>
                <button class="submit-btn" id="loginSubmitBtn">登录</button>
                <p class="login-error" id="loginError"></p>
                <button class="skip-login-btn" id="skipLoginBtn">跳过登录，以游客身份浏览</button>
            </div>
            <div class="login-form" id="registerForm" style="display:none">
                <div class="form-group">
                    <input type="text" id="registerUsername" placeholder="用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="registerPassword" placeholder="密码" autocomplete="new-password">
                </div>
                <button class="submit-btn" id="registerSubmitBtn">注册</button>
                <p class="login-error" id="registerError"></p>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    <span>新建对话</span>
                </button>
                <div class="search-modes" id="searchModes">
                    <div class="mode-item" data-mode="agent">
                        <i class="fas fa-robot"></i>
                        <span>智能助手</span>
                    </div>
                    <div class="mode-item" data-mode="summary-post">
                        <i class="fas fa-file-text"></i>
                        <span>文档问答</span>
                    </div>
                </div>
            </div>
            <hr class="sidebar-divider">
            <div class="sidebar-section">
                <div class="section-header">
                    <i class="fas fa-database"></i>
                    <span>知识库管理</span>
                </div>
                <div class="section-items">
                    <button class="section-item" id="listDocsBtn">
                        <i class="fas fa-list"></i>
                        <span>查看文档列表</span>
                    </button>
                    <button class="section-item" id="uploadDocBtn">
                        <i class="fas fa-upload"></i>
                        <span>上传文档</span>
                    </button>
                    <button class="section-item" id="addDocsBtn">
                        <i class="fas fa-plus-circle"></i>
                        <span>手动添加问答对</span>
                    </button>
                    <button class="section-item" id="clearDocsBtn">
                        <i class="fas fa-trash-alt"></i>
                        <span>清空所有文档</span>
                    </button>
                    <button class="section-item" id="countDocsBtn">
                        <i class="fas fa-counter"></i>
                        <span>统计文档数量</span>
                    </button>
                </div>
            </div>
            <hr class="sidebar-divider">
            <div class="sidebar-section">
                <div class="section-header">
                    <i class="fas fa-comments"></i>
                    <span>对话管理</span>
                </div>
                <div class="section-items">
                    <button class="section-item" id="listConvsBtn">
                        <i class="fas fa-list-ul"></i>
                        <span>查看对话列表</span>
                    </button>
                    <button class="section-item" id="updateTitleBtn">
                        <i class="fas fa-pencil-alt"></i>
                        <span>修改对话标题</span>
                    </button>
                </div>
            </div>
            <hr class="sidebar-divider">
            <div class="sidebar-section">
                <div class="section-header">
                    <i class="fas fa-history"></i>
                    <span>历史对话</span>
                </div>
                <div class="conversations-list" id="conversationsList">
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <div class="chat-header" id="chatHeader">
                <h2>智能问答系统</h2>
                <div class="header-actions">
                    <span class="current-user" id="currentUserLabel" style="display:none"></span>
                    <button class="action-btn" id="logoutBtn" style="display:none">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>退出</span>
                    </button>
                    <button class="action-btn" id="deleteConvBtn" style="display:none">
                        <i class="fas fa-trash"></i>
                        <span>删除当前对话</span>
                    </button>
                    <button class="clear-history" id="clearHistoryBtn">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <i class="fas fa-comments"></i>
                    <h1>欢迎使用智能问答系统</h1>
                    <p>基于 ReAct Agent 的智能客服系统，支持文档检索、FAQ问答、上下文理解等多种功能</p>
                </div>
            </div>

            <div class="modal" id="docsModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>文档列表</h3>
                        <button class="modal-close" id="docsModalClose">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body" id="docsModalBody">
                    </div>
                </div>
            </div>

            <div class="modal" id="uploadDocModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>上传文档</h3>
                        <button class="modal-close" id="uploadDocModalClose">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="upload-area" id="uploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>点击或拖拽文件到这里上传</p>
                            <p class="upload-hint">支持 PDF、TXT、DOCX、MD 等格式</p>
                            <p class="upload-hint">最大文件大小限制为 50MB</p>
                            <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.doc,.md,.html" style="display:none">
                        </div>
                        <div class="upload-progress" id="uploadProgress" style="display:none">
                            <div class="progress-bar"></div>
                            <span class="progress-text">上传中...</span>
                        </div>
                        <button class="submit-btn" id="uploadFileBtn" style="display:none">上传文档</button>
                    </div>
                </div>
            </div>

            <div class="modal" id="addDocsModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>添加问答对</h3>
                        <button class="modal-close" id="addDocsModalClose">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>问题</label>
                            <input type="text" id="docQuestion" placeholder="请输入问题">
                        </div>
                        <div class="form-group">
                            <label>答案</label>
                            <textarea id="docAnswer" placeholder="请输入答案" rows="4"></textarea>
                        </div>
                        <button class="submit-btn" id="submitDocBtn">添加问答对</button>
                    </div>
                </div>
            </div>

            <div class="modal" id="updateTitleModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>修改对话标题</h3>
                        <button class="modal-close" id="updateTitleModalClose">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>新标题</label>
                            <input type="text" id="newTitle" placeholder="请输入新标题">
                        </div>
                        <button class="submit-btn" id="submitTitleBtn">保存新标题</button>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
            </div>

            <div class="input-area" id="inputArea">
                <textarea id="messageInput" placeholder="输入您的问题..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
